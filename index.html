<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #39ff14; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 20, 0, 0.9); border: 1px solid #39ff14;
            padding: 15px; border-radius: 5px; pointer-events: none;
        }
        .count { font-size: 50px; font-weight: bold; line-height: 1; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau { background: #39ff14; color: #000; padding: 4px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; white-space: nowrap; text-transform: uppercase; }
        .d-rau { width: 10px; height: 10px; background: #fff; border-radius: 50%; margin-top: 4px; border: 2px solid #39ff14; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px;">STATUS DO RADAR</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; color: #fff;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // Configuração direta e simplificada
    const API_KEY = 'F-h8pw.m-7q0A:8u-vYfP9nFv5L8kK';
    const ably = new Ably.Realtime({ key: API_KEY });
    const channel = ably.channels.get('radar-global');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function ligarSinal() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            if (data.latitude) {
                const info = {
                    lat: data.latitude,
                    lng: data.longitude,
                    city: (data.city || "ON").toUpperCase()
                };
                
                // Entra na rede
                await channel.presence.enter(info);
                document.getElementById('status').innerText = "ONLINE: " + info.city;
                world.pointOfView({ lat: info.lat, lng: info.lng, altitude: 2.5 }, 2000);
            }
        } catch (e) {
            document.getElementById('status').innerText = "ERRO NA REDE";
        }
    }

    function atualizar() {
        channel.presence.get((err, members) => {
            if (!err) {
                const pts = members.map(m => m.data);
                document.getElementById('count').innerText = pts.length;
                world.htmlElementsData(pts);
            }
        });
    }

    // Eventos simplificados
    channel.presence.subscribe(() => atualizar());
    
    ably.connection.on('connected', () => {
        document.getElementById('status').innerText = "CONECTADO";
        ligarSinal();
        setTimeout(atualizar, 1000);
    });
</script>
</body>
</html>
