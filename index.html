<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v27 - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 15, 0, 0.95); border: 2px solid #39ff14;
            padding: 15px; color: #39ff14; border-radius: 5px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); pointer-events: none;
        }
        .count { font-size: 55px; font-weight: bold; line-height: 1; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 12px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 0 15px #39ff14; white-space: nowrap; text-transform: uppercase;
        }
        .l-rau img { width: 22px; border: 1px solid #000; border-radius: 2px; }
        .d-rau { 
            width: 14px; height: 14px; background: #fff; border-radius: 50%; 
            margin-top: 6px; border: 2px solid #39ff14; box-shadow: 0 0 15px #39ff14;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 2px; font-weight: bold;">SISTEMA LIVE ABLY</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; color: #fff; margin-top: 5px;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // A TUA CHAVE REAL ESTÁ AQUI:
    const ably = new Ably.Realtime('F-h8pw.m-7q0A:8u-vYfP9nFv5L8kK');
    const channel = ably.channels.get('radar-global');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 1.0;

    async function enviarSinal() {
        try {
            // Tentativa de localização via IP
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            // Verificamos se temos coordenadas (evitar África/0,0)
            const lat = parseFloat(data.latitude);
            const lng = parseFloat(data.longitude);

            if (lat && lat !== 0) {
                const myInfo = {
                    id: ably.connection.id,
                    lat: lat,
                    lng: lng,
                    city: (data.city || "SINAL").toUpperCase(),
                    country: data.country_code
                };

                // Publicar presença
                channel.presence.enter(myInfo);
                document.getElementById('status').innerText = "SINAL: " + myInfo.city;
                world.pointOfView({ lat: lat, lng: lng, altitude: 2.2 }, 2000);
            }
        } catch (e) {
            document.getElementById('status').innerText = "ERRO GPS";
        }
    }

    // Função de atualização forçada
    function forceUpdate() {
        channel.presence.get((err, members) => {
            if (!err) {
                const points = members.map(m => m.data).filter(p => p && p.lat);
                document.getElementById('count').innerText = points.length;
                world.htmlElementsData(points);
            }
        });
    }

    // Escutar eventos de entrada e saída
    channel.presence.subscribe('enter', forceUpdate);
    channel.presence.subscribe('leave', forceUpdate);
    channel.presence.subscribe('present', forceUpdate);

    ably.connection.on('connected', () => {
        document.getElementById('status').innerText = "ONLINE";
        enviarSinal();
        // Forçamos uma verificação após 2 segundos
        setTimeout(forceUpdate, 2000);
    });

</script>
</body>
</html>
