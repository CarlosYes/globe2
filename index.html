<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - ULTRA PERFORMANCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; }
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; user-select: none; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon);
            padding: 15px; color: var(--neon); border-radius: 4px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }
        .count { font-size: 50px; font-weight: bold; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau { background: var(--neon); color: #000; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
        .d-rau { width: 8px; height: 8px; background: #fff; border-radius: 50%; margin-top: 4px; border: 2px solid var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; font-weight: bold;">SISTEMA OPERACIONAL</div>
</div>

<div id="globeViz"></div>

<script>
    const API_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ably = new Ably.Realtime({ key: API_KEY });
    const channel = ably.channels.get('radar-global');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;

    // SERVIÇO EFICAZ: Cloudflare Trace + Fallback via Geolocation nativa
    async function obterPosicao() {
        try {
            // Método 1: Cloudflare (Rápido e sem bloqueios de CORS comuns)
            const response = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const text = await response.text();
            const ip = text.match(/ip=(.*)/)[1];
            
            // Localização via IP usando um serviço de alta disponibilidade
            const locRes = await fetch(`https://ipapi.co/${ip}/json/`);
            const data = await locRes.json();
            
            if(data.latitude) return { lat: data.latitude, lng: data.longitude, city: data.city.toUpperCase() };
            throw new Error();
        } catch (e) {
            // Método 2: Backup via GPS nativo do navegador
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, city: "GPS LOCAL" }),
                    () => resolve(null)
                );
            });
        }
    }

    async function ligar() {
        const myPos = await obterPosicao();
        if (myPos) {
            await channel.presence.enter(myPos);
            document.getElementById('status').innerText = "ONLINE: " + myPos.city;
            world.pointOfView({ lat: myPos.lat, lng: myPos.lng, altitude: 2.2 }, 2000);
        } else {
            document.getElementById('status').innerText = "SINAL ANONIMO";
            // Posição padrão caso tudo falhe para não quebrar o radar
            await channel.presence.enter({ lat: 0, lng: 0, city: "ANONIMO" });
        }
    }

    function atualizar() {
        channel.presence.get((err, members) => {
            if (!err) {
                const pontos = members.map(m => m.data).filter(p => p && p.lat);
                document.getElementById('count').innerText = pontos.length;
                world.htmlElementsData(pontos);
            }
        });
    }

    // Anti-Theft
    document.onkeydown = (e) => {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    channel.presence.subscribe(atualizar);
    ably.connection.on('connected', () => {
        ligar();
        setTimeout(atualizar, 1000);
    });
</script>
</body>
</html>
