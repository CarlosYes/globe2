<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - PRO TOTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; --bg: #050505; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.9); border: 2px solid var(--neon);
            padding: 15px; color: var(--neon); border-radius: 4px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }
        .count { font-size: 50px; font-weight: bold; line-height: 1; }
        .m-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .l-rau { background: var(--neon); color: #000; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; white-space: nowrap; }
        .d-rau { width: 8px; height: 8px; background: #fff; border-radius: 50%; margin-top: 4px; border: 2px solid var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; font-weight: bold;">SISTEMA EM STANDBY</div>
</div>

<div id="globeViz"></div>

<script>
    // CHAVES E CONFIGURAÇÃO
    const API_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ably = new Ably.Realtime({ key: API_KEY, closeOnUnload: true });
    const channel = ably.channels.get('radar-global');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // MOTOR DE LOCALIZAÇÃO
    async function getReliableLocation() {
        try {
            // Usando apenas ipapi.co para simplificar e evitar bloqueios de CORS mistos
            const data = await fetch('https://ipapi.co/json/').then(r => r.json());
            if (data.latitude) return { 
                lat: data.latitude, 
                lng: data.longitude, 
                city: data.city ? data.city.toUpperCase() : "DESCONHECIDO",
                id: Math.random().toString(36).substr(2, 9) // ID único para evitar conflitos
            };
        } catch(e) { console.error("Erro na localização:", e); }

        const saved = localStorage.getItem('last_geo');
        if (saved) return JSON.parse(saved);

        return { lat: -23.55, lng: -46.63, city: "SÃO PAULO" }; // Default
    }

    async function bootstrap() {
        const pos = await getReliableLocation();
        localStorage.setItem('last_geo', JSON.stringify(pos));
        
        // Entra na presença com os dados de localização
        await channel.presence.enter(pos);
        document.getElementById('status').innerText = "RADAR ATIVO: " + pos.city;
        
        // Foca no ponto do usuário
        world.pointOfView({ lat: pos.lat, lng: pos.lng, altitude: 2.0 }, 2000);
        
        atualizar();
    }

    function atualizar() {
        channel.presence.get((err, members) => {
            if (err) {
                console.error("Erro ao obter membros:", err);
                return;
            }
            // Mapeia os dados garantindo que lat/lng existam
            const pontos = members
                .map(m => m.data)
                .filter(p => p && typeof p.lat === 'number');

            document.getElementById('count').innerText = pontos.length;
            
            // ATUALIZAÇÃO CRÍTICA: Força o globe.gl a redesenhar os elementos
            world.htmlElementsData(pontos);
        });
    }

    // EVENTOS DE PRESENÇA
    channel.presence.subscribe('enter', atualizar);
    channel.presence.subscribe('leave', atualizar);
    channel.presence.subscribe('update', atualizar);

    // Inicialização quando o Ably conectar
    ably.connection.on('connected', () => {
        bootstrap();
    });

    // SEGURANÇA MÁXIMA
    document.onkeydown = (e) => {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
