<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR PRO - SPEED</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.2/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #globeViz { width: 100vw; height: 100vh; position: fixed; }
        
        /* HUD simplificado e ultra-rápido */
        .hud {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0,20,0,0.9); border: 1px solid var(--neon);
            padding: 10px 20px; color: var(--neon); border-radius: 2px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .count { font-size: 42px; font-weight: bold; line-height: 1; display: block; }
        
        /* Marcador Radar com Bandeira */
        .m-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label { 
            display: flex; align-items: center; gap: 5px;
            background: #000; border: 1px solid var(--neon);
            padding: 2px 8px; border-radius: 10px; color: #fff;
            font-size: 10px; font-weight: bold;
        }
        .flag { width: 16px; height: 10px; border-radius: 1px; }
        .dot { 
            width: 8px; height: 8px; background: var(--neon); 
            border-radius: 50%; margin-top: 4px; position: relative;
            box-shadow: 0 0 8px var(--neon);
        }
        .pulse {
            position: absolute; width: 100%; height: 100%;
            background: var(--neon); border-radius: 50%;
            animation: r-pulse 2s infinite;
        }
        @keyframes r-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <span id="count" class="count">0</span>
    <small id="status">SISTEMA ATIVO</small>
</div>

<div id="globeViz"></div>

<script>
(function() {
    // Ably Config
    const A_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ably = new Ably.Realtime({ key: A_KEY });
    const radar = ably.channels.get('radar-global');

    // Inicialização do Globo - Configuração de Performance
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .atmosphereDaylightAlpha(0.1)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const f = `https://flagcdn.com/w40/${d.cc.toLowerCase()}.png`;
            el.innerHTML = `
                <div class="label">
                    <img src="${f}" class="flag" onerror="this.style.display='none'">
                    <span>${d.city}</span>
                </div>
                <div class="dot"><div class="pulse"></div></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // Localização via Cloudflare (Serviço mais rápido que existe)
    async function start() {
        try {
            // Tentativa 1: API de alta velocidade
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const user = {
                lat: data.latitude,
                lng: data.longitude,
                city: (data.city || "CONECTADO").toUpperCase(),
                cc: data.country_code || "us"
            };

            radar.presence.enter(user);
            document.getElementById('status').innerText = `RADAR: ${user.city}`;
            world.pointOfView({ lat: user.lat, lng: user.lng, altitude: 2.5 }, 1500);
            
            sync();
        } catch (e) {
            document.getElementById('status').innerText = "ERRO SINAL GPS";
        }
    }

    function sync() {
        radar.presence.get((err, members) => {
            if (err) return;
            const pts = members.map(m => m.data).filter(p => p && p.lat);
            document.getElementById('count').innerText = pts.length;
            world.htmlElementsData(pts);
        });
    }

    radar.presence.subscribe(['enter', 'leave'], sync);
    ably.connection.on('connected', start);

    window.addEventListener('resize', () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    });
})();
</script>
</body>
</html>
