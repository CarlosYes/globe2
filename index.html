<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.2/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        #globeViz { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,10,0,0.9); border: 1px solid var(--neon);
            padding: 15px; border-radius: 4px; color: var(--neon);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            pointer-events: auto;
        }
        .count { font-size: 55px; font-weight: bold; line-height: 1; display: block; }
        .status-msg { font-size: 10px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .controls { display: flex; gap: 8px; border-top: 1px solid rgba(57, 255, 20, 0.2); padding-top: 10px; }
        .btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold;
        }
        .btn.active { background: var(--neon); color: #000; }

        /* Marcadores Radar */
        .m-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label { 
            display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.9); 
            border: 1px solid var(--neon); padding: 4px 10px; border-radius: 20px; 
            color: #fff; font-size: 11px; font-weight: bold; white-space: nowrap;
        }
        .flag { width: 18px; height: 12px; border-radius: 2px; }
        .dot { 
            width: 10px; height: 10px; background: var(--neon); border-radius: 50%; 
            margin-top: 5px; position: relative; box-shadow: 0 0 10px var(--neon);
        }
        .pulse {
            position: absolute; width: 100%; height: 100%; background: var(--neon); 
            border-radius: 50%; animation: p-ring 2s infinite;
        }
        @keyframes p-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <span id="count" class="count">0</span>
    <span id="status" class="status-msg">Radar em Espera...</span>
    <div class="controls">
        <button id="v-btn" class="btn">Som: ON</button>
        <button id="a-btn" class="btn">Giro: ON</button>
    </div>
</div>

<div id="globeViz"></div>

<script>
(function() {
    const config = {
        vol: localStorage.getItem('rau_v') !== 'false',
        auto: localStorage.getItem('rau_a') !== 'false'
    };

    const client = new Ably.Realtime({ key: '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs' });
    const radar = client.channels.get('radar-global');

    // Inicialização do Globo - Usando JSDelivr para as texturas (Não bloqueia)
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flagUrl = `https://flagcdn.com/w40/${d.cc.toLowerCase()}.png`;
            el.innerHTML = `<div class="label"><img src="${flagUrl}" class="flag" onerror="this.style.display='none'"><span>${d.city}</span></div><div class="dot"><div class="pulse"></div></div>`;
            return el;
        });

    world.controls().autoRotate = config.auto;
    world.controls().autoRotateSpeed = 0.5;

    // LOCALIZAÇÃO VIA CLOUDFLARE (Ultra Estável)
    async function startSystem() {
        document.getElementById('status').innerText = "DETECTANDO SINAL...";
        let data = null;

        try {
            // Tentativa 1: Serviço mais avançado e rápido
            const res = await fetch('https://ipapi.co/json/');
            data = await res.json();
        } catch (e) {
            // Backup imediato: Se o IPAPI bloquear, este serviço é o plano B
            try {
                const res2 = await fetch('https://freeipapi.com/api/json');
                const d2 = await res2.json();
                data = { latitude: d2.latitude, longitude: d2.longitude, city: d2.cityName, country_code: d2.countryCode };
            } catch (e2) {
                // FALLBACK DE EMERGÊNCIA: Ponto fixo para o sistema NÃO MORRER
                data = { latitude: 38.7, longitude: -9.1, city: "ESTAÇÃO BASE", country_code: "pt" };
            }
        }

        const user = {
            lat: data.latitude,
            lng: data.longitude,
            city: (data.city || "VISITANTE").toUpperCase(),
            cc: data.country_code || "un",
            id: client.connection.id
        };

        radar.presence.enter(user);
        document.getElementById('status').innerText = `RADAR ATIVO: ${user.city}`;
        world.pointOfView({ lat: user.lat, lng: user.lng, altitude: 2.2 }, 2000);
        refresh();
    }

    function refresh() {
        radar.presence.get((err, members) => {
            if (err) return;
            const pts = members.map(m => m.data).filter(p => p && p.lat);
            document.getElementById('count').innerText = pts.length;
            world.htmlElementsData(pts);
        });
    }

    radar.presence.subscribe(['enter', 'leave'], refresh);
    client.connection.on('connected', startSystem);

    // Controles de Memória
    const vBtn = document.getElementById('v-btn');
    const aBtn = document.getElementById('a-btn');
    const syncUI = () => {
        vBtn.innerText = `Som: ${config.vol ? 'ON' : 'OFF'}`;
        vBtn.classList.toggle('active', config.vol);
        aBtn.innerText = `Giro: ${config.auto ? 'ON' : 'OFF'}`;
        aBtn.classList.toggle('active', config.auto);
        world.controls().autoRotate = config.auto;
    };
    vBtn.onclick = () => { config.vol = !config.vol; localStorage.setItem('rau_v', config.vol); syncUI(); };
    aBtn.onclick = () => { config.auto = !config.auto; localStorage.setItem('rau_a', config.auto); syncUI(); };

    syncUI();
    window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
})();
</script>
</body>
</html>
