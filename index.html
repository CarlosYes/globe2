<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - PRO TOTAL</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.2/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; --bg: #000; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        #globeViz { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        
        /* HUD Interface */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.9); border: 2px solid var(--neon);
            padding: 15px; color: var(--neon); border-radius: 4px;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            pointer-events: auto;
        }
        .count { font-size: 55px; font-weight: bold; line-height: 1; display: block; text-shadow: 0 0 10px var(--neon); }
        .status-text { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .controls { display: flex; gap: 8px; }
        .btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn.active { background: var(--neon); color: #000; }

        /* Marcadores do Globo */
        .m-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label-box { 
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.85); border: 1px solid var(--neon);
            padding: 4px 10px; border-radius: 20px; color: #fff;
            font-size: 11px; font-weight: bold; white-space: nowrap;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .flag-img { width: 18px; height: 12px; border-radius: 2px; object-fit: cover; }
        .radar-dot { 
            width: 10px; height: 10px; background: var(--neon); 
            border-radius: 50%; margin-top: 5px; position: relative;
            box-shadow: 0 0 15px var(--neon);
        }
        .radar-pulse {
            position: absolute; width: 100%; height: 100%;
            background: var(--neon); border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <span id="count" class="count">0</span>
    <span id="status" class="status-text">Sistema Ativo</span>
    <div class="controls">
        <button id="v-btn" class="btn">Som: ON</button>
        <button id="a-btn" class="btn">Giro: ON</button>
    </div>
</div>

<div id="globeViz"></div>

<script>
(function() {
    const state = {
        vol: localStorage.getItem('rau_v') !== 'false',
        auto: localStorage.getItem('rau_a') !== 'false'
    };

    const A_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const client = new Ably.Realtime({ key: A_KEY });
    const radar = client.channels.get('radar-global');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .atmosphereDaylightAlpha(0.1)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flagUrl = `https://flagcdn.com/w40/${d.cc.toLowerCase()}.png`;
            el.innerHTML = `
                <div class="label-box">
                    <img src="${flagUrl}" class="flag-img" onerror="this.style.display='none'">
                    <span>${d.city}</span>
                </div>
                <div class="radar-dot"><div class="radar-pulse"></div></div>
            `;
            return el;
        });

    world.controls().autoRotate = state.auto;
    world.controls().autoRotateSpeed = 0.5;

    async function getLocation() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            if(d.latitude) return { lat: d.latitude, lng: d.longitude, city: d.city, cc: d.country_code };
        } catch(e) {}
        try {
            const r = await fetch('https://freeipapi.com/api/json');
            const d = await r.json();
            if(d.latitude) return { lat: d.latitude, lng: d.longitude, city: d.cityName, cc: d.countryCode };
        } catch(e) {}
        return { lat: 0, lng: 0, city: "VISITANTE", cc: "un" };
    }

    async function start() {
        const pos = await getLocation();
        const userData = {
            lat: pos.lat,
            lng: pos.lng,
            city: pos.city.toUpperCase(),
            cc: pos.cc.toLowerCase(),
            id: client.connection.id
        };

        radar.presence.enter(userData);
        document.getElementById('status').innerText = `RADAR: ${userData.city}`;
        world.pointOfView({ lat: userData.lat, lng: userData.lng, altitude: 2.2 }, 2000);
        refresh();
    }

    function refresh() {
        radar.presence.get((err, members) => {
            if (err) return;
            const points = members.map(m => m.data).filter(p => p && p.lat !== undefined);
            document.getElementById('count').innerText = points.length;
            world.htmlElementsData(points);
        });
    }

    radar.presence.subscribe(['enter', 'leave'], refresh);

    const vBtn = document.getElementById('v-btn');
    const aBtn = document.getElementById('a-btn');

    const syncUI = () => {
        vBtn.innerText = `Som: ${state.vol ? 'ON' : 'OFF'}`;
        vBtn.classList.toggle('active', state.vol);
        aBtn.innerText = `Giro: ${state.auto ? 'ON' : 'OFF'}`;
        aBtn.classList.toggle('active', state.auto);
        world.controls().autoRotate = state.auto;
    };

    vBtn.onclick = () => { state.vol = !state.vol; localStorage.setItem('rau_v', state.vol); syncUI(); };
    aBtn.onclick = () => { state.auto = !state.auto; localStorage.setItem('rau_a', state.auto); syncUI(); };

    syncUI();
    client.connection.on('connected', start);

    window.addEventListener('resize', () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    });
})();
</script>
</body>
</html>
