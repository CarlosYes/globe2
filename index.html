<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - LIVE</title>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; color: #39ff14; }
        #globeViz { width: 100vw; height: 100vh; }
        
        /* HUD */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.8); border: 1px solid #39ff14;
            padding: 15px; border-radius: 4px; pointer-events: none;
        }
        .count { font-size: 40px; font-weight: bold; display: block; }
        
        /* Marcador de Visita */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .label { 
            display: flex; align-items: center; gap: 5px;
            background: #000; border: 1px solid #39ff14;
            padding: 2px 6px; border-radius: 10px; font-size: 10px;
        }
        .flag { width: 14px; height: 10px; border-radius: 1px; }
        .dot { 
            width: 8px; height: 8px; background: #39ff14; 
            border-radius: 50%; margin-top: 3px; position: relative;
            box-shadow: 0 0 10px #39ff14;
        }
        .pulse {
            position: absolute; width: 100%; height: 100%;
            background: #39ff14; border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <span id="count" class="count">0</span>
    <small id="status">INICIANDO RADAR...</small>
</div>

<div id="globeViz"></div>

<script>
    // Memória de Configurações
    const config = {
        auto: localStorage.getItem('rau_auto') !== 'false'
    };

    const API_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ably = new Ably.Realtime({ key: API_KEY });
    const channel = ably.channels.get('radar-global');

    // Inicializa o Globo
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flagUrl = `https://flagcdn.com/w20/${d.cc.toLowerCase()}.png`;
            el.innerHTML = `
                <div class="label">
                    <img src="${flagUrl}" class="flag">
                    <span>${d.city}</span>
                </div>
                <div class="dot"><div class="pulse"></div></div>
            `;
            return el;
        });

    world.controls().autoRotate = config.auto;

    async function start() {
        try {
            // Pegando localização via API estável
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const user = {
                lat: data.latitude,
                lng: data.longitude,
                city: data.city,
                cc: data.country_code
            };

            channel.presence.enter(user);
            document.getElementById('status').innerText = `ONLINE: ${user.city.toUpperCase()}`;
            world.pointOfView({ lat: user.lat, lng: user.lng, altitude: 2 }, 2000);
            
            update();
        } catch (e) {
            document.getElementById('status').innerText = "ERRO AO LOCALIZAR";
        }
    }

    function update() {
        channel.presence.get((err, members) => {
            if (err) return;
            const pts = members.map(m => m.data).filter(p => p && p.lat);
            document.getElementById('count').innerText = pts.length;
            world.htmlElementsData(pts);
        });
    }

    channel.presence.subscribe(['enter', 'leave'], update);
    ably.connection.on('connected', start);

    window.addEventListener('resize', () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    });
</script>
</body>
</html>
