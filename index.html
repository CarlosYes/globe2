<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v15 - LIVE</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 20, 0, 0.9); border: 2px solid #39ff14;
            padding: 15px; color: #39ff14; pointer-events: none; border-radius: 4px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
        .count { font-size: 50px; font-weight: bold; line-height: 1; }
        
        /* Estilo do Marcador (Ponto Verde + Nome + Bandeira) */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 5px 10px; border-radius: 4px;
            font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 15px #39ff14; white-space: nowrap; text-transform: uppercase;
        }
        .l-rau img { width: 20px; height: auto; border: 1px solid #000; border-radius: 2px; }
        .d-rau { 
            width: 14px; height: 14px; background: #39ff14; border-radius: 50%; 
            margin-top: 5px; box-shadow: 0 0 20px #39ff14;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 2px; font-weight: bold;">RADAR EM DIRETO</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 5px;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // LIGAÇÃO AO SEU SERVIDOR NO RENDER
    const socket = io('https://globe2.onrender.com'); 

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        // CONFIGURAÇÃO DOS PONTOS NO GLOBO
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flagUrl = d.country ? `https://flagcdn.com/w40/${d.country.toLowerCase()}.png` : '';
            const flagImg = flagUrl ? `<img src="${flagUrl}">` : '';
            
            el.innerHTML = `
                <div class="l-rau">
                    ${flagImg}
                    <span>${d.city}</span>
                </div>
                <div class="d-rau"></div>
            `;
            return el;
        });

    // --- ATIVAR ROTAÇÃO LENTA PARA A DIREITA ---
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.8; // Velocidade da rotação (ajuste se quiser mais rápido)

    async function init() {
        try {
            // Obter localização do visitante
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const myPos = {
                lat: parseFloat(data.latitude) || 0,
                lng: parseFloat(data.longitude) || 0,
                city: (data.city || "Sinal Ativo").toUpperCase(),
                country: data.country_code || "PT"
            };

            // Enviar posição para o servidor
            socket.emit('update_position', myPos);
            document.getElementById('status').innerText = "CONECTADO: " + myPos.city;

            // Focar a câmara inicialmente na posição do utilizador
            world.pointOfView({ lat: myPos.lat, lng: myPos.lng, altitude: 2.5 }, 2000);

            // Ouvir atualizações de todos os utilizadores ativos
            socket.on('radar_update', (users) => {
                document.getElementById('count').innerText = users.length;
                world.htmlElementsData(users);
            });

        } catch (e) {
            document.getElementById('status').innerText = "ERRO AO OBTER LOCALIZAÇÃO";
        }
    }

    // Tentar reconectar caso o servidor caia
    socket.on('connect', () => {
        console.log("Ligado ao Servidor RAU");
    });

    window.onload = init;
</script>
</body>
</html>
