<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v17 - LIVE GLOBAL</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        
        /* Painel HUD */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 20, 0, 0.85); border: 2px solid #39ff14;
            padding: 15px; color: #39ff14; pointer-events: none; border-radius: 8px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }
        .count { font-size: 45px; font-weight: 900; line-height: 1; margin: 5px 0; }
        
        /* Marcador no Globo (Bandeira + Cidade + Ponto) */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 0 15px #39ff14; white-space: nowrap; text-transform: uppercase;
        }
        .l-rau img { width: 20px; height: auto; border: 1px solid #000; border-radius: 2px; }
        
        /* Ponto Verde Pulsante */
        .d-rau { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            margin-top: 5px; border: 2px solid #39ff14;
            box-shadow: 0 0 15px #39ff14;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
            70% { transform: scale(1.4); box-shadow: 0 0 0 12px rgba(57, 255, 20, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 2px; font-weight: bold; opacity: 0.8;">RADAR EM DIRETO</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; color: #fff;">SINTONIZANDO SINAL...</div>
</div>

<div id="globeViz"></div>

<script>
    // Ligação ao servidor Render
    const socket = io('https://globe2.onrender.com', { 
        transports: ['websocket', 'polling'],
        reconnectionAttempts: 5 
    }); 

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            // Flagcdn usa o código do país (ex: ch para Suíça, fr para França)
            const flagCode = d.country ? d.country.toLowerCase() : 'un';
            const flagImg = `<img src="https://flagcdn.com/w40/${flagCode}.png">`;
            
            el.innerHTML = `
                <div class="l-rau">
                    ${flagImg}
                    <span>${d.city}</span>
                </div>
                <div class="d-rau"></div>
            `;
            return el;
        });

    // Configuração de Rotação (Gira suavemente para a direita)
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.9;

    async function getLivePosition() {
        try {
            // Usamos o serviço ip-api que deteta automaticamente o país sem erro de SSL
            const response = await fetch('https://demo.ip-api.com/json/?fields=66842623');
            const data = await response.json();
            
            const myPos = {
                lat: parseFloat(data.lat),
                lng: parseFloat(data.lon),
                city: (data.city || "SINAL ATIVO").toUpperCase(),
                country: data.countryCode // Deteta o país onde estás agora!
            };

            socket.emit('update_position', myPos);
            document.getElementById('status').innerText = "SINAL: " + myPos.city + " (" + myPos.country + ")";
            
            // Foca a câmara na tua zona
            world.pointOfView({ lat: myPos.lat, lng: myPos.lng, altitude: 2.3 }, 2000);

        } catch (error) {
            console.error("Erro GPS:", error);
            document.getElementById('status').innerText = "SINAL GPS LIMITADO";
        }
    }

    // Quando o servidor ligar, envia a posição
    socket.on('connect', () => {
        getLivePosition();
    });

    // Atualiza todos os sinais no globo
    socket.on('radar_update', (users) => {
        document.getElementById('count').innerText = users.length;
        world.htmlElementsData(users);
    });

    // Tentar reconectar se o servidor acordar
    socket.on('disconnect', () => {
        document.getElementById('status').innerText = "A RECONECTAR...";
    });

</script>
</body>
</html>
