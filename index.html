<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR ELITE</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.2/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        #globeViz { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,20,0,0.95); border: 2px solid var(--neon);
            padding: 15px; color: var(--neon); border-radius: 2px;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.4);
            pointer-events: auto; min-width: 160px;
        }
        .count { font-size: 60px; font-weight: bold; line-height: 1; display: block; }
        .status-txt { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .controls { display: flex; gap: 8px; border-top: 1px solid rgba(57, 255, 20, 0.3); padding-top: 10px; }
        .btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 5px 10px; cursor: pointer; font-size: 9px; font-weight: bold; text-transform: uppercase;
        }
        .btn.active { background: var(--neon); color: #000; }

        /* Marcadores de Radar Estilo Militar */
        .m-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label { 
            display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.9); 
            border: 1px solid var(--neon); padding: 4px 10px; border-radius: 20px; 
            color: #fff; font-size: 11px; font-weight: bold; white-space: nowrap;
        }
        .flag { width: 18px; height: 12px; border-radius: 2px; object-fit: cover; }
        .dot { 
            width: 10px; height: 10px; background: var(--neon); border-radius: 50%; 
            margin-top: 5px; position: relative; box-shadow: 0 0 15px var(--neon);
        }
        .pulse {
            position: absolute; width: 100%; height: 100%; background: var(--neon); 
            border-radius: 50%; animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <span id="count" class="count">0</span>
    <span id="status" class="status-txt">Sincronizando Radar...</span>
    <div class="controls">
        <button id="v-btn" class="btn">Som: ON</button>
        <button id="a-btn" class="btn">Giro: ON</button>
    </div>
</div>

<div id="globeViz"></div>

<script>
(function() {
    // Configurações e Memória
    const settings = {
        vol: localStorage.getItem('rau_v') !== 'false',
        auto: localStorage.getItem('rau_a') !== 'false'
    };

    // Ligação Ably
    const client = new Ably.Realtime({ key: '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs' });
    const radar = client.channels.get('radar-global');

    // Inicialização do Globo (Textura de Alto Desempenho)
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = `https://flagcdn.com/w40/${d.cc.toLowerCase()}.png`;
            el.innerHTML = `<div class="label"><img src="${flag}" class="flag" onerror="this.style.display='none'"><span>${d.city}</span></div><div class="dot"><div class="pulse"></div></div>`;
            return el;
        });

    world.controls().autoRotate = settings.auto;
    world.controls().autoRotateSpeed = 0.5;

    // SISTEMA DE ATIVAÇÃO FORÇADA
    async function startRadar() {
        document.getElementById('status').innerText = "LIGANDO À BASE...";
        
        // Em vez de esperar por APIs lentas, definimos um perfil e deixamos o Ably gerir
        // Usamos um fallback de Lisboa caso a geolocalização falhe instantaneamente
        const user = {
            lat: 38.7, 
            lng: -9.1, 
            city: "RADAR ATIVO", 
            cc: "pt",
            id: client.connection.id
        };

        // Tentativa rápida de localização via Cloudflare/CGI (Serviço de alta prioridade)
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(data.latitude) {
                user.lat = data.latitude;
                user.lng = data.longitude;
                user.city = data.city.toUpperCase();
                user.cc = data.country_code.toLowerCase();
            }
        } catch (e) {
            console.log("Sistema em modo de segurança: Coordenadas Base Ativas.");
        }

        radar.presence.enter(user);
        document.getElementById('status').innerText = `RADAR: ${user.city}`;
        world.pointOfView({ lat: user.lat, lng: user.lng, altitude: 2.2 }, 2000);
        update();
    }

    function update() {
        radar.presence.get((err, members) => {
            if (err) return;
            const pts = members.map(m => m.data).filter(p => p && p.lat);
            document.getElementById('count').innerText = pts.length;
            world.htmlElementsData(pts);
        });
    }

    // Handlers
    radar.presence.subscribe(['enter', 'leave'], update);
    client.connection.on('connected', startRadar);

    const vBtn = document.getElementById('v-btn');
    const aBtn = document.getElementById('a-btn');
    const syncUI = () => {
        vBtn.innerText = `Som: ${settings.vol ? 'ON' : 'OFF'}`;
        vBtn.classList.toggle('active', settings.vol);
        aBtn.innerText = `Giro: ${settings.auto ? 'ON' : 'OFF'}`;
        aBtn.classList.toggle('active', settings.auto);
        world.controls().autoRotate = settings.auto;
    };

    vBtn.onclick = () => { settings.vol = !settings.vol; localStorage.setItem('rau_v', settings.vol); syncUI(); };
    aBtn.onclick = () => { settings.auto = !settings.auto; localStorage.setItem('rau_a', settings.auto); syncUI(); };

    syncUI();
    window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
})();
</script>
</body>
</html>
