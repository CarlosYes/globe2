<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.2/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --neon: #39ff14; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        #globeViz { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,20,0,0.9); border: 2px solid var(--neon);
            padding: 15px; color: var(--neon); border-radius: 4px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        .count { font-size: 55px; font-weight: bold; line-height: 1; display: block; }
        .controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold;
        }
        .btn.active { background: var(--neon); color: #000; }

        /* Marcador de Visita */
        .m-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label { 
            display: flex; align-items: center; gap: 6px;
            background: #000; border: 1px solid var(--neon);
            padding: 4px 10px; border-radius: 20px; color: #fff;
            font-size: 11px; font-weight: bold; white-space: nowrap;
        }
        .flag { width: 18px; height: 12px; border-radius: 2px; }
        .dot { 
            width: 10px; height: 10px; background: var(--neon); 
            border-radius: 50%; margin-top: 5px; position: relative;
            box-shadow: 0 0 10px var(--neon);
        }
        .pulse {
            position: absolute; width: 100%; height: 100%;
            background: var(--neon); border-radius: 50%;
            animation: radar-pulse 2s infinite;
        }
        @keyframes radar-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <span id="count" class="count">0</span>
    <small id="status">INICIALIZANDO RADAR...</small>
    <div class="controls">
        <button id="v-btn" class="btn">SOM: ON</button>
        <button id="a-btn" class="btn">AUTO: ON</button>
    </div>
</div>

<div id="globeViz"></div>

<script>
(function() {
    const config = {
        vol: localStorage.getItem('rau_v') !== 'false',
        auto: localStorage.getItem('rau_a') !== 'false'
    };

    const client = new Ably.Realtime({ key: '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs' });
    const radar = client.channels.get('radar-global');

    // Inicialização do Globo - Estilo Radar (Sem texturas pesadas para não falhar)
    const world = Globe()(document.getElementById('globeViz'))
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg') // Fallback se carregar
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = `https://flagcdn.com/w40/${d.cc.toLowerCase()}.png`;
            el.innerHTML = `<div class="label"><img src="${flag}" class="flag"><span>${d.city}</span></div><div class="dot"><div class="pulse"></div></div>`;
            return el;
        });

    world.controls().autoRotate = config.auto;
    world.controls().autoRotateSpeed = 0.5;

    async function start() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const user = {
                lat: data.latitude || 0,
                lng: data.longitude || 0,
                city: (data.city || "SISTEMA").toUpperCase(),
                cc: data.country_code || "un"
            };

            radar.presence.enter(user);
            document.getElementById('status').innerText = "ONLINE: " + user.city;
            world.pointOfView({ lat: user.lat, lng: user.lng, altitude: 2.2 }, 2000);
            update();
        } catch (e) {
            document.getElementById('status').innerText = "ERRO GPS - RECARREGUE";
        }
    }

    function update() {
        radar.presence.get((err, members) => {
            if (err) return;
            const pts = members.map(m => m.data).filter(p => p && p.lat);
            document.getElementById('count').innerText = pts.length;
            world.htmlElementsData(pts);
        });
    }

    radar.presence.subscribe(['enter', 'leave'], update);
    client.connection.on('connected', start);

    // Controles e Persistência
    const vBtn = document.getElementById('v-btn');
    const aBtn = document.getElementById('a-btn');
    const syncUI = () => {
        vBtn.innerText = `SOM: ${config.vol ? 'ON' : 'OFF'}`;
        vBtn.classList.toggle('active', config.vol);
        aBtn.innerText = `AUTO: ${config.auto ? 'ON' : 'OFF'}`;
        aBtn.classList.toggle('active', config.auto);
        world.controls().autoRotate = config.auto;
    };
    vBtn.onclick = () => { config.vol = !config.vol; localStorage.setItem('rau_v', config.vol); syncUI(); };
    aBtn.onclick = () => { config.auto = !config.auto; localStorage.setItem('rau_a', config.auto); syncUI(); };

    syncUI();
    window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
})();
</script>
</body>
</html>
