<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 15px; color: #39ff14; border-radius: 5px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }
        .count { font-size: 55px; font-weight: bold; line-height: 1; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau { background: #39ff14; color: #000; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; color: #39ff14; font-weight: bold;">SISTEMA ATIVO</div>
</div>

<div id="globeViz"></div>

<script>
    // TUA API KEY REAL INSERIDA:
    const API_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ably = new Ably.Realtime({ key: API_KEY });
    const channel = ably.channels.get('radar-global');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;

    async function ligar() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if (data.latitude) {
                const myPos = { lat: data.latitude, lng: data.longitude, city: data.city.toUpperCase() };
                // Entrar no canal de presença
                await channel.presence.enter(myPos);
                document.getElementById('status').innerText = "ONLINE: " + myPos.city;
                world.pointOfView({ lat: myPos.lat, lng: myPos.lng, altitude: 2.2 }, 2000);
            }
        } catch (e) { document.getElementById('status').innerText = "ERRO GPS"; }
    }

    function atualizar() {
        channel.presence.get((err, members) => {
            if (!err) {
                const pontos = members.map(m => m.data).filter(p => p && p.lat);
                document.getElementById('count').innerText = pontos.length;
                world.htmlElementsData(pontos);
            }
        });
    }

    // Escutar quem entra/sai
    channel.presence.subscribe(atualizar);
    
    ably.connection.on('connected', () => { 
        ligar(); 
        setTimeout(atualizar, 1500); 
    });
</script>
</body>
</html>
