<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Live Visitor Globe</title>
    <style>
        /* Estilização do Container */
        body {
            margin: 0;
            background-color: #f0f0f0; /* Fundo claro para contrastar com o oceano branco */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .globe-wrapper {
            position: relative;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            /* Impede que selecionem ou arrastem o widget */
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Camada Invisível de Proteção (Anti-Theft) */
        /* Isso impede cliques diretos no script, dificultando a cópia do ID */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="globe-wrapper">
    <div class="shield"></div>
    
    <script type="text/javascript" src="//rf.revolvermaps.com/0/0/8.js?i=5mx1p2p3p4p&amp;m=0&amp;c=ff0000&amp;cr1=ffffff&amp;f=arial&amp;l=33&amp;bv=90&amp;lx=-420&amp;ly=420&amp;hi=20&amp;he=7&amp;hc=a8ddff&amp;rs=80" async="async"></script>
</div>

<script>
    /* PROTEÇÃO DE INTEGRIDADE
       Garante que o widget só funcione conforme o esperado
    */
    
    // Bloqueia F12 e ferramentas de inspeção
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0)))) {
            return false;
        }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
            return false;
        }
    };
</script>

</body>
</html>
