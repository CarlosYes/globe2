<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Globo de Visitantes Real-Time</title>
    <style>
        /* Fundo da página */
        body {
            margin: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container do Globo - Estilo exato da sua imagem */
        .globe-box {
            position: relative;
            padding: 15px;
            background: #ffffff;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Camada de Segurança (Anti-Theft) */
        /* Bloqueia cliques diretos para proteger sua Key e o widget */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: transparent;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="globe-box">
        <div class="shield"></div>

        <script type="text/javascript" src="//rf.revolvermaps.com/0/0/8.js?i=0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs&amp;m=0&amp;c=ff0000&amp;cr1=ffffff&amp;f=arial&amp;l=33&amp;bv=90&amp;lx=-420&amp;ly=420&amp;hi=20&amp;he=7&amp;hc=a8ddff&amp;rs=80" async="async"></script>
    </div>

    <script>
        /* Proteção de Código */
        document.onkeydown = function(e) {
            // Bloqueia F12, Ctrl+U e Inspeção
            if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.shiftKey && e.keyCode == 73))) {
                return false;
            }
        };
    </script>

</body>
</html>
