<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Globe Player</title>
    <style>
        /* Container Principal */
        .mmvst_outer {
            box-sizing: border-box;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            height: 400px;
            width: 400px;
            background: transparent;
        }

        .mmvst_inner, .mmvst_globe {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Camadas do Globo */
        .mmvst_map, .mmvst_map_f, .mmvst_map_b, .mmvst_inner_shadow, .mmvst_ref_top {
            position: absolute;
            display: block;
            margin: 0;
            top: 0;
            left: 0;
        }

        /* Máscara Circular do Globo */
        .mmvst_map {
            z-index: 2;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* Texturas do Mapa (Frente e Fundo para efeito 3D) */
        .mmvst_map_f, .mmvst_map_b {
            width: 1800px;
            height: 450px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAwIDkwMCI+PHBhdGggZD0iTTAsMEgxODAwVjkwMEgwWiIgZmlsbD0iIzA4MTkyNyIvPjxwYXRoIGQ9Ik00MjkuMyAxNDQuMDVsMS45LjI0IDIuMS0uNjQgMi42MyAyLS4yIDEuNjUtLjcuNC0uMTggMS4yLTEuNjYtMS4xMi0xLjQuMTUtMi43My0yLjctMS4xNy0uMTgtLjE2LS41MiAxLjU0LS41eiIgZmlsbD0iIzQ0YmY4NyIvPjwvc3ZnPg==');
            background-size: cover;
        }

        /* Animação de Rotação */
        @keyframes rotateGlobe {
            from { transform: translateX(0); }
            to { transform: translateX(-900px); }
        }

        .mmvst_map_f { animation: rotateGlobe 20s linear infinite; opacity: 0.8; }
        .mmvst_map_b { animation: rotateGlobe 30s linear infinite; opacity: 0.4; }

        /* Sombras e Reflexos */
        .mmvst_inner_shadow {
            z-index: 3;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        .mmvst_ref_top {
            z-index: 4;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
            border-radius: 200px 200px 0 0;
        }

        /* Controles (Volume e Status) */
        .player-controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .control-btn {
            cursor: pointer;
            color: white;
            font-size: 14px;
            user-select: none;
            transition: transform 0.2s;
        }

        .control-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="mmvst_outer" id="main-player-container">
    <div class="mmvst_inner">
        <div class="mmvst_globe">
            <div class="mmvst_map">
                <div class="mmvst_map_b"></div>
                <div class="mmvst_map_f"></div>
            </div>
            <div class="mmvst_inner_shadow"></div>
            <div class="mmvst_ref_top"></div>
        </div>
    </div>

    <div class="player-controls">
        <div id="volume-toggle" class="control-btn" title="Alternar Volume">🔊</div>
        <div id="autoplay-toggle" class="control-btn" title="Autoplay On/Off">▶️</div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // Configurações de Segurança e Persistência
        const STORAGE_KEYS = {
            VOLUME: 'mmvst_vol_state',
            AUTOPLAY: 'mmvst_autoplay_state'
        };

        const volumeBtn = document.getElementById('volume-toggle');
        const autoplayBtn = document.getElementById('autoplay-toggle');
        const mapLayer = document.querySelector('.mmvst_map_f');

        // Função para carregar estados salvos
        function initSettings() {
            const savedVol = localStorage.getItem(STORAGE_KEYS.VOLUME);
            const savedAuto = localStorage.getItem(STORAGE_KEYS.AUTOPLAY);

            if (savedVol === 'muted') {
                volumeBtn.innerText = 'muted' ? '🔇' : '🔊';
            }

            if (savedAuto === 'off') {
                mapLayer.style.animationPlayState = 'paused';
                autoplayBtn.innerText = '⏸️';
            }
        }

        // Toggle Volume
        volumeBtn.addEventListener('click', () => {
            const isMuted = volumeBtn.innerText === '🔇';
            volumeBtn.innerText = isMuted ? '🔊' : '🔇';
            localStorage.setItem(STORAGE_KEYS.VOLUME, isMuted ? 'active' : 'muted');
        });

        // Toggle Autoplay
        autoplayBtn.addEventListener('click', () => {
            const isPaused = mapLayer.style.animationPlayState === 'paused';
            mapLayer.style.animationPlayState = isPaused ? 'running' : 'paused';
            autoplayBtn.innerText = isPaused ? '▶️' : '⏸️';
            localStorage.setItem(STORAGE_KEYS.AUTOPLAY, isPaused ? 'on' : 'off');
        });

        // Proteção contra inspeção simples e cópia
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Anti-theft: Impede que o player funcione fora do domínio pretendido (opcional)
        /*
        const authorizedDomain = "seusite.com";
        if (!window.location.hostname.includes(authorizedDomain)) {
            document.body.innerHTML = "Acesso não autorizado ao player.";
        }
        */

        initSettings();
    })();
</script>

</body>
</html>
