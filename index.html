<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v15 - FIX</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        .hud { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0, 20, 0, 0.9); border: 2px solid #39ff14; padding: 15px; color: #39ff14; border-radius: 8px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); pointer-events: none; }
        .count { font-size: 50px; font-weight: bold; line-height: 1; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau { background: #39ff14; color: #000; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; box-shadow: 0 0 15px #39ff14; white-space: nowrap; text-transform: uppercase; }
        .l-rau img { width: 18px; border: 1px solid #000; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; box-shadow: 0 0 15px #39ff14; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 70% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 2px;">SINAL EM DIRETO</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; color: #fff;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // LIGAÇÃO AO RENDER
    const socket = io('https://globe2.onrender.com', { transports: ['websocket', 'polling'] }); 

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // ROTAÇÃO LENTA PARA A DIREITA
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.8;

    async function localizacao() {
        try {
            // Tentativa 1: ipapi (mais detalhado)
            const response = await fetch('https://ipapi.co/json/');
            if (!response.ok) throw new Error();
            return await response.json();
        } catch (e) {
            // Tentativa 2: ip-api (mais robusto contra bloqueios)
            const response2 = await fetch('https://ip-api.com/json/');
            const d = await response2.json();
            return { latitude: d.lat, longitude: d.lon, city: d.city, country_code: d.countryCode };
        }
    }

    async function init() {
        try {
            const data = await localizacao();
            const myPos = {
                lat: parseFloat(data.latitude) || 38.7, // Lisboa por defeito se falhar
                lng: parseFloat(data.longitude) || -9.1,
                city: (data.city || "Sinal Ativo").toUpperCase(),
                country: data.country_code || "PT"
            };

            socket.emit('update_position', myPos);
            document.getElementById('status').innerText = "SINAL: " + myPos.city;
            world.pointOfView({ lat: myPos.lat, lng: myPos.lng, altitude: 2.2 }, 2000);

        } catch (err) {
            document.getElementById('status').innerText = "SINAL EM MODO SEGURO";
            // Se tudo falhar, envia uma posição genérica para o globo não travar
            socket.emit('update_position', { lat: 38.7, lng: -9.1, city: "RADAR ON", country: "PT" });
        }
    }

    socket.on('radar_update', (users) => {
        document.getElementById('count').innerText = users.length;
        world.htmlElementsData(users);
    });

    socket.on('connect', init);
    window.onload = () => { if(!socket.connected) init(); };
</script>
</body>
</html>
