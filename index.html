<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - FINAL SECURITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        :root {
            --neon-green: #39ff14;
            --bg-dark: #000000;
        }

        body { 
            margin: 0; 
            background: var(--bg-dark); 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
            user-select: none; /* Proteção básica contra cópia */
        }

        #globeViz { width: 100vw; height: 100vh; position: absolute; }

        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.85); border: 2px solid var(--neon-green);
            padding: 20px; color: var(--neon-green); border-radius: 8px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            pointer-events: none;
        }

        .count { font-size: 64px; font-weight: bold; line-height: 1; text-shadow: 0 0 10px var(--neon-green); }
        .system-label { font-size: 12px; letter-spacing: 2px; margin-top: 5px; }

        /* Estilo dos Marcadores no Globo */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau { 
            background: var(--neon-green); color: #000; 
            padding: 2px 8px; border-radius: 3px; 
            font-size: 10px; font-weight: bold; white-space: nowrap;
            box-shadow: 0 0 10px var(--neon-green);
        }
        .d-rau { 
            width: 10px; height: 10px; background: #fff; 
            border-radius: 50%; margin-top: 4px; 
            border: 2px solid var(--neon-green); 
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; } 
            70% { transform: scale(3); opacity: 0; } 
            100% { transform: scale(1); opacity: 0; } 
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div id="count" class="count">0</div>
    <div class="system-label">RADAR_ATIVO</div>
    <div id="status" style="font-size: 11px; margin-top: 10px; opacity: 0.8;">SCANNING...</div>
</div>

<div id="globeViz"></div>

<script>
    /**
     * CONFIGURAÇÃO E SEGURANÇA
     */
    const API_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ably = new Ably.Realtime({ key: API_KEY });
    const channel = ably.channels.get('radar-global');

    // Inicialização do Globo
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // --- FUNÇÕES DE NÚCLEO ---

    async function ligarRadar() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            if (data.latitude) {
                const myPos = { 
                    lat: data.latitude, 
                    lng: data.longitude, 
                    city: data.city.toUpperCase() 
                };

                // Presença no Ably
                await channel.presence.enter(myPos);
                
                document.getElementById('status').innerText = "LOCALIZADO: " + myPos.city;
                world.pointOfView({ lat: myPos.lat, lng: myPos.lng, altitude: 2.0 }, 3000);
            }
        } catch (e) { 
            document.getElementById('status').innerText = "ERRO NA GEOLOCALIZAÇÃO"; 
        }
    }

    function atualizarPresenca() {
        channel.presence.get((err, members) => {
            if (!err) {
                const pontos = members.map(m => m.data).filter(p => p && p.lat);
                document.getElementById('count').innerText = pontos.length;
                world.htmlElementsData(pontos);
            }
        });
    }

    // --- SEGURANÇA E PERSISTÊNCIA ---

    // Bloqueio de teclas de inspeção (Anti-Theft)
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };

    // Escutar eventos de presença
    channel.presence.subscribe(atualizarPresenca);

    // Conexão Inicial
    ably.connection.on('connected', () => {
        ligarRadar();
        setTimeout(atualizarPresenca, 1000);
    });

</script>
</body>
</html>
